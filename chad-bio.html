<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chad Young | SmashMouth Footballerz</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
}

.host-card{
    position:relative;
    max-width:1400px;
    margin:40px auto;
    background:#111;
    border:4px solid #9b59ff;
    border-radius:25px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    padding:30px;
    box-shadow:
        0 0 20px #9b59ff,
        0 0 60px rgba(155,89,255,.5);
}

.host-card:hover{
    transform:scale(1.01);
    transition:.3s ease;
}

.bio-poster{
    width:100%;
    border-radius:15px;
    display:block;
}

.card-info{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.card-info h1{
    color:#9b59ff;
    font-size:4rem;
    margin:0;
}

.card-info h2{
    margin:10px 0 30px;
    color:white;
}

.attributes{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.attribute{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1a1a1a;
    padding:15px;
    border-left:4px solid #9b59ff;
    border-radius:10px;
}

.attribute strong{
    color:#9b59ff;
    font-size:1.4rem;
}

.rating-badge{
    position:absolute;
    top:20px;
    right:20px;
    width:100px;
    height:100px;
    border-radius:50%;
    background:#9b59ff;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:2.5rem;
    font-weight:bold;
    box-shadow:0 0 25px #9b59ff;
}

.rating-badge span{
    font-size:.8rem;
}

.back-btn{
    display:inline-block;
    margin-top:30px;
    width:fit-content;
    background:#9b59ff;
    color:white;
    text-decoration:none;
    padding:15px 30px;
    border-radius:10px;
    font-weight:bold;
}

.back-btn:hover{
    background:#7d3cff;
}

@media(max-width:900px){

.host-card{
    grid-template-columns:1fr;
}

.card-info h1{
    font-size:2.5rem;
}

.rating-badge{
    width:80px;
    height:80px;
    font-size:2rem;
}

}

</style>
</head>

<body>

<div class="host-card">

    <div class="rating-badge">
        98
        <span>OVR</span>
    </div>

    <img src="Chad-Bio.png" alt="Chad Young" class="bio-poster">

    <div class="card-info">

        <h1>CHAD YOUNG</h1>
        <h2>DYNASTY KING</h2>

        <div class="attributes">

            <div class="attribute">
                <span>Rookie Scouting</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>Prospect Evaluation</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>Dynasty Strategy</span>
                <strong>98</strong>
            </div>

            <div class="attribute">
                <span>Trade Analysis</span>
                <strong>97</strong>
            </div>

            <div class="attribute">
                <span>Future Vision</span>
                <strong>100</strong>
            </div>

        </div>

        <a href="index.html#hosts" class="back-btn">
            ← Back To Meet The Ballerz
        </a>

    </div>

</div>

</body>
</html>
