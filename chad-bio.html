<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chad Young | Dynasty Master</title>

<style>

body{
    margin:0;
    padding:30px;
    background:
    radial-gradient(circle at center,#0d001f 0%,#000 70%);
    color:white;
    font-family:Arial,sans-serif;
}

.host-card{
    position:relative;
    max-width:1400px;
    margin:40px auto;

    background:#111;

    border:4px solid #8a2be2;
    border-radius:25px;

    overflow:hidden;

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;

    padding:30px;

    animation: dynastyGlow 4s infinite;

    box-shadow:
        0 0 20px #8a2be2,
        0 0 50px rgba(138,43,226,.8),
        0 0 100px rgba(0,191,255,.4);
}

@keyframes dynastyGlow {

    0%{
        box-shadow:
        0 0 20px #8a2be2,
        0 0 50px rgba(138,43,226,.8),
        0 0 100px rgba(0,191,255,.4);
    }

    50%{
        box-shadow:
        0 0 30px #00bfff,
        0 0 70px rgba(138,43,226,.9),
        0 0 120px rgba(0,191,255,.6);
    }

    100%{
        box-shadow:
        0 0 20px #8a2be2,
        0 0 50px rgba(138,43,226,.8),
        0 0 100px rgba(0,191,255,.4);
    }
}

.host-card:hover{
    transform:scale(1.01);
    transition:.3s ease;
}

.bio-poster{
    width:100%;
    border-radius:15px;
    display:block;
}

.card-info{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.card-info h1{
    margin:0;
    font-size:4rem;

    background:linear-gradient(
        90deg,
        #00bfff,
        #8a2be2
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.dynasty-title{
    color:#00bfff;
    font-size:1.2rem;
    font-weight:bold;
    margin:10px 0 20px;
    text-shadow:0 0 15px #00bfff;
}

.card-info h2{
    margin:0 0 30px;
    color:#ffffff;
    font-size:1.6rem;
}

.attributes{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.attribute{
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:#1a1a1a;

    padding:15px;

    border-left:5px solid #8a2be2;
    border-radius:10px;

    box-shadow:
        0 0 10px rgba(138,43,226,.3);
}

.attribute span{
    font-weight:bold;
}

.attribute strong{
    color:#00bfff;
    font-size:1.3rem;
}

.rating-badge{
    position:absolute;

    top:20px;
    right:20px;

    width:120px;
    height:120px;

    border-radius:50%;

    background:linear-gradient(
        135deg,
        #00bfff,
        #8a2be2
    );

    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    font-size:2.8rem;
    font-weight:bold;

    border:4px solid white;

    box-shadow:
        0 0 20px #00bfff,
        0 0 40px #8a2be2,
        0 0 80px #8a2be2;
}

.rating-badge span{
    font-size:.75rem;
}

.back-btn{
    display:inline-block;

    margin-top:30px;
    width:fit-content;

    background:#8a2be2;
    color:white;

    text-decoration:none;

    padding:15px 30px;

    border-radius:10px;

    font-weight:bold;
}

.back-btn:hover{
    background:#6a1bb5;
}

@media(max-width:900px){

    .host-card{
        grid-template-columns:1fr;
    }

    .card-info h1{
        font-size:2.5rem;
    }

    .rating-badge{
        width:90px;
        height:90px;
        font-size:2rem;
    }
}

</style>
</head>

<body>

<div class="host-card">

    <div class="rating-badge">
        98
        <span>DYNASTY</span>
    </div>

    <img src="/Chad-Bio.png" alt="Chad Young" class="bio-poster">

    <div class="card-info">

        <h1>CHAD YOUNG</h1>

        <div class="dynasty-title">
            ★ DYNASTY MASTER ★
        </div>

        <h2>🔮 ROOKIE & DYNASTY EXPERT 🔮</h2>

        <div class="attributes">

            <div class="attribute">
                <span>Rookie Scouting</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>Prospect Evaluation</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>Dynasty Strategy</span>
                <strong>98</strong>
            </div>

            <div class="attribute">
                <span>Trade Analysis</span>
                <strong>97</strong>
            </div>

            <div class="attribute">
                <span>Future Vision</span>
                <strong>100</strong>
            </div>

            <div class="attribute">
                <span>Sleeper Identification</span>
                <strong>99</strong>
            </div>

        </div>

        <a href="index.html#hosts" class="back-btn">
            ← Back To Meet The Ballerz
        </a>

    </div>

</div>

</body>
</html>
