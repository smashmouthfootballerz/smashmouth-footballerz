<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nic Tate | Legendary Card</title>

<style>

body{
    margin:0;
    padding:30px;
    background:radial-gradient(circle at center,#1a0000 0%,#000000 70%);
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.host-card{
    position:relative;
    max-width:1400px;
    margin:40px auto;
    background:#111;
    border:4px solid #ff0000;
    border-radius:25px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    padding:30px;

    animation: legendaryGlow 2.5s infinite ease-in-out;

    box-shadow:
        0 0 20px #ff0000,
        0 0 50px rgba(255,0,0,.8),
        0 0 100px rgba(255,215,0,.5);
}

.host-card::before{
    content:"";
    position:absolute;
    top:0;
    left:-150%;
    width:50%;
    height:100%;

    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.25),
        transparent
    );

    transform:skewX(-25deg);

    animation: shine 5s infinite;
}

@keyframes shine{

    0%{
        left:-150%;
    }

    100%{
        left:200%;
    }
}

@keyframes legendaryGlow {

    0%{
        box-shadow:
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 80px #ffd700;
    }

    25%{
        box-shadow:
        0 0 30px #ff0000,
        0 0 60px #ff3300,
        0 0 120px #ffd700;
    }

    50%{
        box-shadow:
        0 0 50px #ffd700,
        0 0 100px #ff0000,
        0 0 160px #ffd700;
    }

    75%{
        box-shadow:
        0 0 30px #ff0000,
        0 0 60px #ff3300,
        0 0 120px #ffd700;
    }

    100%{
        box-shadow:
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 80px #ffd700;
    }
}

.host-card:hover{
    transform:scale(1.01);
    transition:.3s ease;
}

.bio-poster{
    width:100%;
    border-radius:15px;
    display:block;
}

.card-info{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.card-info h1{
    margin:0;
    font-size:4rem;

    background:linear-gradient(
        90deg,
        #ffd700,
        #ff0000
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.legend-title{
    color:#ffd700;
    font-size:1.2rem;
    font-weight:bold;
    margin:10px 0 20px;
    text-shadow:0 0 15px #ffd700;
}

.card-info h2{
    margin:0 0 30px;
    color:#ffffff;
    font-size:1.6rem;
}

.attributes{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.attribute{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1a1a1a;
    padding:15px;
    border-left:5px solid #ff0000;
    border-radius:10px;
    box-shadow:0 0 10px rgba(255,0,0,.3);
}

.attribute span{
    font-weight:bold;
}

.attribute strong{
    color:#ffd700;
    font-size:1.3rem;
}

.rating-badge{
    position:absolute;
    top:20px;
    right:20px;

    width:120px;
    height:120px;

    border-radius:50%;

    background:linear-gradient(
        135deg,
        #ffd700,
        #ff0000
    );

    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    font-size:2.8rem;
    font-weight:bold;

    border:4px solid white;

    box-shadow:
        0 0 20px #ffd700,
        0 0 40px #ff0000,
        0 0 80px #ff0000;
}

.rating-badge span{
    font-size:.75rem;
}

.back-btn{
    display:inline-block;
    margin-top:30px;
    width:fit-content;

    background:#ff0000;
    color:white;

    text-decoration:none;

    padding:15px 30px;

    border-radius:10px;

    font-weight:bold;
}

.back-btn:hover{
    background:#cc0000;
}

@media(max-width:900px){

    .host-card{
        grid-template-columns:1fr;
    }

    .card-info h1{
        font-size:2.5rem;
    }

    .rating-badge{
        width:90px;
        height:90px;
        font-size:2rem;
    }
}

</style>
</head>

<body>

<div class="host-card">

    <div class="rating-badge">
        100
        <span>LEGEND</span>
    </div>

    <img src="/Nic-Bio.png" alt="Nic Tate" class="bio-poster">

    <div class="card-info">

        <h1>NIC TATE</h1>

        <div class="legend-title">
            ★ HALL OF FAME TIER ★
        </div>

        <h2>🔥 LEGENDARY FANTASY MASTER 🔥</h2>

        <div class="attributes">

            <div class="attribute">
                <span>Fantasy Research</span>
                <strong>100</strong>
            </div>

            <div class="attribute">
                <span>Draft Strategy</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>Player Rankings</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>League Winning Picks</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>Championship Mindset</span>
                <strong>100</strong>
            </div>

            <div class="attribute">
                <span>Fantasy Dominance</span>
                <strong>100</strong>
            </div>

        </div>

        <a href="index.html#hosts" class="back-btn">
            ← Back To Meet The Ballerz
        </a>

    </div>

</div>

</body>
</html>
