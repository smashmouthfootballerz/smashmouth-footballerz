<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nic Tate | Smashmouth Footballerz</title>

<style>
body{
    margin:0;
    background:#000;
    text-align:center;
    font-family:Arial,sans-serif;
}

.poster{
    width:min(95vw,1000px);
    margin:30px auto;
    display:block;
    border-radius:15px;
    box-shadow:0 0 25px rgba(255,106,0,.5);
}

.back-btn{
    display:inline-block;
    background:#ff6600;
    color:white;
    text-decoration:none;
    padding:15px 30px;
    border-radius:10px;
    font-weight:bold;
    margin-bottom:40px;
}.host-card{
    position:relative;
    max-width:1200px;
    margin:50px auto;
    background:#111;
    border:4px solid #ff6600;
    border-radius:25px;
    overflow:hidden;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    padding:30px;
    box-shadow:
        0 0 20px #ff6600,
        0 0 50px rgba(255,106,0,.5);
}

.host-card:hover{
    transform:scale(1.02);
    transition:.3s ease;
}

.bio-poster{
    width:100%;
    border-radius:15px;
}

.card-info{
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.card-info h1{
    font-size:4rem;
    color:#ff6600;
    margin:0;
}

.card-info h2{
    color:white;
    margin-bottom:30px;
}

.attributes{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.attribute{
    display:flex;
    justify-content:space-between;
    background:#1a1a1a;
    padding:15px;
    border-left:4px solid #ff6600;
    border-radius:8px;
}

.attribute strong{
    color:#ff6600;
    font-size:1.4rem;
}

.rating-badge{
    position:absolute;
    top:20px;
    right:20px;
    width:100px;
    height:100px;
    border-radius:50%;
    background:#ff6600;
    color:white;
    font-size:2.5rem;
    font-weight:bold;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 25px #ff6600;
}

.rating-badge span{
    font-size:.9rem;
}

@media(max-width:900px){

.host-card{
    grid-template-columns:1fr;
}

.card-info h1{
    font-size:2.5rem;
}

}
</style>
</head>

<body>

<div class="host-card">

    <div class="rating-badge">
        99
        <span>OVR</span>
    </div>

    <img src="Nic-Bio.png" class="bio-poster">

    <div class="card-info">

        <h1>NIC TATE</h1>
        <h2>DRAFT DOMINATOR</h2>

        <div class="attributes">

            <div class="attribute">
                <span>Research</span>
                <strong>100</strong>
            </div>

            <div class="attribute">
                <span>Rankings</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>Draft Strategy</span>
                <strong>99</strong>
            </div>

            <div class="attribute">
                <span>Consistency</span>
                <strong>98</strong>
            </div>

        </div>

        <a href="index.html#hosts" class="back-btn">
            ← Back To Meet The Ballerz
        </a>

    </div>

</div>

</body>
